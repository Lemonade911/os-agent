<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FusionOS Agent | 核心控制台</title>
    <style>
        :root {
            --bg-dark: #0b0f19;
            --panel-bg: rgba(18, 25, 43, 0.7);
            --accent-cyan: #00f0ff;
            --accent-purple: #b026ff;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --border-glow: rgba(0, 240, 255, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(176, 38, 255, 0.08), transparent 25%);
        }

        /* 背景网格线 */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        #app-container {
            width: 90%;
            max-width: 1000px;
            height: 85vh;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px var(--border-glow);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 顶部扫描线特效 */
        #app-container::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(transparent, rgba(0, 240, 255, 0.05), transparent);
            transform: rotate(30deg);
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%) rotate(30deg); }
            100% { transform: translateY(100%) rotate(30deg); }
        }

        header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-cyan);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 240, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0); }
        }

        #chat-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* 隐藏滚动条 */
        #chat-area::-webkit-scrollbar { width: 6px; }
        #chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message-row { display: flex; width: 100%; margin-bottom: 15px; }
        .message-row.user { justify-content: flex-end; }
        .message-row.ai { justify-content: flex-start; }

        .bubble {
            max-width: 75%;
            padding: 16px 20px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.95rem;
            word-wrap: break-word;
            position: relative;
        }

        .user .bubble {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.15), rgba(0, 150, 255, 0.1));
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-bottom-right-radius: 2px;
            color: var(--accent-cyan);
        }

        .ai .bubble {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 2px;
            color: var(--text-main);
        }

        /* 授权码特殊样式 */
        .auth-card {
            margin-top: 15px;
            background: rgba(176, 38, 255, 0.1);
            border: 1px dashed var(--accent-purple);
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .auth-card:hover {
            background: rgba(176, 38, 255, 0.2);
            box-shadow: 0 0 15px rgba(176, 38, 255, 0.3);
        }

        .auth-card::before {
            content: '⚠️ SECURITY GATEWAY';
            display: block;
            font-size: 0.7rem;
            color: var(--accent-purple);
            margin-bottom: 5px;
            font-weight: bold;
        }

        #input-area {
            padding: 20px 30px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 15px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        button {
            background: var(--accent-cyan);
            color: #000;
            border: none;
            padding: 0 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
            transform: translateY(-2px);
        }

        button:disabled {
            background: #334155;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px 0;
        }

        .typing-indicator span {
            width: 6px; height: 6px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div class="brand">
            <div class="status-dot"></div>
            FusionOS Agent <span style="color: var(--text-dim); font-size: 0.8rem; font-weight: normal;">| 可信任中枢控制台</span>
        </div>
        <div style="font-family: monospace; color: var(--accent-cyan); font-size: 0.8rem;">
            SYS_SEC: SECURE | CORE: ACTIVE
        </div>
    </header>

    <div id="chat-area">
        <div class="message-row ai">
            <div class="bubble">
                [系统引导就绪]<br><br>您好，我是您的 FusionOS 智能管家。我已经连接到底层系统控制平面，您可以直接使用自然语言下达指令。<br><br><span style="color: var(--text-dim); font-size: 0.85em;">* 所有核心操作受 AgentSec-Core 策略网关保护。</span>
            </div>
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder=">_ 输入系统指令..." onkeypress="handleEnter(event)">
        <button id="send-btn" onclick="sendMessage()">执行 (Execute)</button>
    </div>
</div>

<script>
    // 你的启动agent服务器 API 地址+port
    const API_URL = "http://192.xx.xx.xx:3001/v1/chat/completions";
    const SESSION_ID = 'hackathon-demo-' + Math.floor(Math.random() * 10000);

    const chatArea = document.getElementById('chat-area');
    const inputField = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    let isWaiting = false;

    // 处理回车发送
    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    // 自动滚动到底部
    function scrollToBottom() {
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    // 解析文字中的授权码并渲染成酷炫的卡片
    function formatText(text) {
        // 匹配包含 APPROVE xxxx 的格式
        const approveRegex = /(APPROVE\s[a-zA-Z0-9-]+)/g;
        
        let formatted = text.replace(/\n/g, '<br>');
        
        if (approveRegex.test(formatted)) {
            formatted = formatted.replace(approveRegex, (match) => {
                return `</div><div class="auth-card" onclick="copyAndFillAuth('${match}')" title="点击提取授权码">
                    ${match}<br>
                    <span style="font-size: 0.75rem; color: #94a3b8; display: block; margin-top: 5px;">[点击以提取验证令牌]</span>
                </div><div class="bubble" style="background:transparent; border:none; padding:0; margin-top:10px;">`;
            });
        }
        return formatted;
    }

    // 点击授权码自动填充到输入框
    function copyAndFillAuth(code) {
        inputField.value = code;
        inputField.focus();
        // 添加一个点击的视觉反馈
        inputField.style.boxShadow = "0 0 20px rgba(176, 38, 255, 0.6)";
        setTimeout(() => { inputField.style.boxShadow = "none"; }, 500);
    }

    // 添加消息气泡
    function appendMessage(role, text) {
        const row = document.createElement('div');
        row.className = `message-row ${role}`;
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = formatText(text);
        
        row.appendChild(bubble);
        chatArea.appendChild(row);
        scrollToBottom();
    }

    // 显示/隐藏打字机等待动画
    function toggleLoading(show) {
        if (show) {
            const row = document.createElement('div');
            row.className = 'message-row ai loading-indicator';
            row.innerHTML = `<div class="bubble" style="padding: 12px 20px;"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            chatArea.appendChild(row);
        } else {
            const loader = document.querySelector('.loading-indicator');
            if (loader) loader.remove();
        }
        scrollToBottom();
    }

    async function sendMessage() {
        if (isWaiting) return;
        
        const text = inputField.value.trim();
        if (!text) return;

        appendMessage('user', text);
        inputField.value = '';
        isWaiting = true;
        sendBtn.disabled = true;
        sendBtn.innerText = 'PROCESSING...';
        
        toggleLoading(true);

        const payload = {
            session_id: SESSION_ID,
            messages: [{ role: 'user', content: text }]
        };

        // 兼容审批逻辑：如果包含 APPROVE，提取出来放进 approval_text
        if (text.includes('APPROVE ')) {
            const match = text.match(/(APPROVE\s[a-zA-Z0-9-]+)/);
            if (match) {
                payload.approval_text = match[1];
                // 为了绕过你后端的强制 messages 校验，保留 messages 数组
                payload.messages = [{ role: 'user', content: "提交审批令牌" }];
            }
        }

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const data = await response.json();
            toggleLoading(false);
            
            if (data.error) {
                appendMessage('ai', `[系统异常] 连接中断或服务错误：<br><span style="color: #ef4444;">${data.error}</span>`);
            } else {
                appendMessage('ai', data.choices[0].message.content);
            }
        } catch (error) {
            toggleLoading(false);
            appendMessage('ai', '[致命错误] 无法连接到 Agent 中枢。请确保后端服务正在运行并且已配置 CORS 跨域。');
        } finally {
            isWaiting = false;
            sendBtn.disabled = false;
            sendBtn.innerText = '执行 (Execute)';
            inputField.focus();
        }
    }
</script>

</body>
</html>
